<!DOCTYPE html>
<html lang="ko">
<head>

<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #e8edf2; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const TOURS = {
  jeju: [
    { id: 1, title: "Hallasan Sunrise Hike", type: "Small Group", price: 79, rating: 4.9, reviews: 312, tag: "Nature", img: "🌋" },
    { id: 2, title: "Jeju East Full Day", type: "Bus Tour", price: 49, rating: 4.8, reviews: 541, tag: "Classic", img: "🌊" },
    { id: 3, title: "Olle Trail & Café Hop", type: "Small Group", price: 89, rating: 4.9, reviews: 198, tag: "Scenic", img: "☕" },
    { id: 4, title: "Jeju Private Family Day", type: "Private", price: 229, rating: 5.0, reviews: 87, tag: "Family", img: "🏡" },
  ],
  seoul: [
    { id: 5, title: "Palace & Bukchon Village", type: "Small Group", price: 69, rating: 4.8, reviews: 422, tag: "Culture", img: "🏯" },
    { id: 6, title: "K-Food Street Night", type: "Small Group", price: 59, rating: 4.9, reviews: 376, tag: "Food", img: "🍜" },
    { id: 7, title: "DMZ Full Day", type: "Bus Tour", price: 79, rating: 4.7, reviews: 612, tag: "History", img: "🪖" },
  ],
  busan: [
    { id: 8, title: "Gamcheon & Coastal Drive", type: "Small Group", price: 69, rating: 4.8, reviews: 284, tag: "Scenic", img: "🎨" },
    { id: 9, title: "Seafood Market & Temple", type: "Small Group", price: 75, rating: 4.9, reviews: 193, tag: "Food", img: "🦞" },
  ],
};

const SEASONS = [
  { label: "여름 특가", icon: "☀️", color: "#FF6B35" },
  { label: "야경 투어", icon: "🌃", color: "#4A3F8F" },
  { label: "미식 투어", icon: "🍱", color: "#E85D4A" },
  { label: "커플 추천", icon: "💕", color: "#D4548A" },
  { label: "아이와 함께", icon: "🧒", color: "#3B9E77" },
  { label: "비 와도 OK", icon: "🌧️", color: "#4A90D9" },
];

const THEMES = [
  { label: "K-Culture", icon: "🎭", tours: 18 },
  { label: "Nature & Hike", icon: "🏔️", tours: 14 },
  { label: "Food & Market", icon: "🥢", tours: 11 },
  { label: "History & Art", icon: "🏛️", tours: 9 },
];

const CRUISES = [
  { title: "Jeju Sunset Cruise", duration: "2h", price: 59, img: "🚢", tag: "Popular" },
  { title: "Busan Yacht Night", duration: "1.5h", price: 79, img: "⛵", tag: "Romantic" },
  { title: "Haenyeo Dive Show", duration: "3h", price: 89, img: "🤿", tag: "Cultural" },
];

function TourCard({ tour, compact = false }) {
  const [liked, setLiked] = useState(false);
  return (
    <div style={{
      minWidth: compact ? 160 : 200,
      background: "#fff",
      borderRadius: 16,
      overflow: "hidden",
      boxShadow: "0 2px 12px rgba(0,0,0,0.08)",
      flexShrink: 0,
      position: "relative",
    }}>
      <div style={{
        height: compact ? 90 : 110,
        background: `linear-gradient(135deg, #1a3a4a, #0d5c63)`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: compact ? 32 : 40,
        position: "relative",
      }}>
        {tour.img}
        <button onClick={() => setLiked(!liked)} style={{
          position: "absolute", top: 8, right: 8,
          background: "rgba(255,255,255,0.9)", border: "none",
          borderRadius: "50%", width: 28, height: 28, cursor: "pointer",
          fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center",
        }}>{liked ? "❤️" : "🤍"}</button>
        <span style={{
          position: "absolute", bottom: 8, left: 8,
          background: "rgba(0,0,0,0.6)", color: "#fff",
          fontSize: 10, padding: "2px 7px", borderRadius: 10, fontFamily: "'DM Sans', sans-serif",
        }}>{tour.type}</span>
      </div>
      <div style={{ padding: compact ? "8px 10px" : "10px 12px" }}>
        <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: compact ? 12 : 13, color: "#1a1a2e", lineHeight: 1.3 }}>{tour.title}</p>
        <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 4 }}>
          <span style={{ color: "#f5a623", fontSize: 11 }}>★</span>
          <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#666" }}>{tour.rating} ({tour.reviews})</span>
        </div>
        <p style={{ margin: "4px 0 0", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 13, color: "#0d5c63" }}>from ${tour.price}</p>
      </div>
    </div>
  );
}

function HorizontalScroll({ children }) {
  return (
    <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingLeft: 20, paddingRight: 20, paddingBottom: 4, scrollbarWidth: "none" }}>
      {children}
    </div>
  );
}

function SectionHeader({ title, sub, link, onLink }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", padding: "0 20px", marginBottom: 12 }}>
      <div>
        <p style={{ margin: 0, fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#0d5c63", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>{sub}</p>
        <h2 style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 20, color: "#1a1a2e", fontWeight: 700 }}>{title}</h2>
      </div>
      {link && <button onClick={onLink} style={{ background: "none", border: "1px solid #0d5c63", color: "#0d5c63", fontSize: 11, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, padding: "4px 12px", borderRadius: 20, cursor: "pointer" }}>{link}</button>}
    </div>
  );
}

function ShowcaseTab({ onNav }) {

  return (
    <div style={{ paddingBottom: 80, overflowY: "auto", height: "100%" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');

      {/* HERO */}

      }}>
        <div style={{ position: "absolute", top: -30, right: -20, width: 200, height: 200, borderRadius: "50%", background: "rgba(255,255,255,0.04)" }} />
        <div style={{ position: "absolute", bottom: -40, left: -30, width: 160, height: 160, borderRadius: "50%", background: "rgba(255,255,255,0.03)" }} />

        <p style={{ margin: "0 0 4px", fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.6)", letterSpacing: 2, textTransform: "uppercase" }}>Korea Day Tours</p>
        <h1 style={{ margin: "0 0 6px", fontFamily: "'Fraunces', serif", fontStyle: "italic", fontSize: 28, color: "#fff", lineHeight: 1.2, fontWeight: 400 }}>Find Your<br/><span style={{ fontStyle: "normal", fontWeight: 700 }}>Perfect Match</span></h1>
        <p style={{ margin: "0 0 20px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.5 }}>Jeju · Seoul · Busan<br/>KTO-Licensed operators only</p>

        <button onClick={() => onNav("match")} style={{
          display: "flex", alignItems: "center", gap: 10,
          background: "#fff", color: "#0d2b35",
          border: "none", borderRadius: 14,
          padding: "14px 20px", width: "100%", cursor: "pointer",
          boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
        }}>
          <span style={{ fontSize: 20 }}>✨</span>
          <div style={{ textAlign: "left", flex: 1 }}>
            <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 15, fontWeight: 700, color: "#0d2b35" }}>AI 투어 매칭 시작하기</p>
            <p style={{ margin: 0, fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#666" }}>Tell us what you want → best fit in 3 sec</p>
          </div>
          <span style={{ fontSize: 18, color: "#0d5c63" }}>→</span>
        </button>

        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          {["Jeju", "Seoul", "Busan"].map(d => (
            <button key={d} onClick={() => setDest(d)} style={{
              background: dest === d ? "#fff" : "rgba(255,255,255,0.15)",
              color: dest === d ? "#0d5c63" : "#fff",
              border: "none", borderRadius: 20, padding: "6px 14px",
              fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, cursor: "pointer",
            }}>{d}</button>
          ))}
        </div>
      </div>

      {[
        { city: "jeju", label: "제주도", sub: "Volcanic Coast · UNESCO" },
        { city: "seoul", label: "서울", sub: "Palaces · K-Culture" },
        { city: "busan", label: "부산", sub: "Beaches · Seafood" },
      ].map(({ city, label, sub }) => (
        <div key={city} style={{ marginTop: 32 }}>

          <HorizontalScroll>
            {TOURS[city].map(t => <TourCard key={t.id} tour={t} />)}
            <div style={{
              minWidth: 120, borderRadius: 16, border: "2px dashed #dde",
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 6, cursor: "pointer", flexShrink: 0,
            }}>
              <span style={{ fontSize: 24 }}>→</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#999", textAlign: "center" }}>See all<br/>{city}</span>
            </div>
          </HorizontalScroll>
        </div>
      ))}

      <div style={{ marginTop: 32 }}>
        <SectionHeader title="시즌 & 테마" sub="By Season & Theme" />
        <HorizontalScroll>
          {SEASONS.map(s => (
            <div key={s.label} style={{
              minWidth: 100, height: 90, borderRadius: 16, flexShrink: 0,
              background: s.color, display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: 6, cursor: "pointer",
              boxShadow: `0 4px 15px ${s.color}55`,
            }}>
              <span style={{ fontSize: 24 }}>{s.icon}</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 600, color: "#fff", textAlign: "center" }}>{s.label}</span>
            </div>
          ))}
        </HorizontalScroll>
      </div>

      <div style={{ marginTop: 28, padding: "0 20px" }}>
        <SectionHeader title="테마별 탐색" sub="Explore by Interest" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {THEMES.map(t => (
            <div key={t.label} style={{
              background: "#f7f8fa", borderRadius: 14, padding: "14px 16px",
              display: "flex", alignItems: "center", gap: 10, cursor: "pointer",
            }}>
              <span style={{ fontSize: 24 }}>{t.icon}</span>
              <div>
                <p style={{ margin: 0, fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#1a1a2e" }}>{t.label}</p>
                <p style={{ margin: 0, fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#888" }}>{t.tours} tours</p>

      <div style={{ marginTop: 32 }}>

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>

              <div key={c.title} style={{

              }}>
                <p style={{ margin: 0, fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#fff" }}>{c.img} {c.title}</p>
                <p style={{ margin: "2px 0 0", fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.6)" }}>{c.duration} · from ${c.price}</p>
              </div>

          <button onClick={() => onNav("cruise")} style={{
            marginTop: 14, background: "#fff", color: "#0d2b35",
            border: "none", borderRadius: 10, padding: "10px 20px",
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 700, cursor: "pointer",
          }}>크루즈 전체보기 →</button>
        </div>
      </div>

      <div style={{ marginTop: 32, marginBottom: 16 }}>
        <SectionHeader title="Most Loved" sub="이번 주 인기" link="Browse all" />

        </HorizontalScroll>

function MatchTab() {
  const [dest, setDest] = useState([]);
  const [tags, setTags] = useState([]);
  const TAGS = ["First time", "Scenic", "Nature + café", "Family", "Rain safer", "With parents", "Less walking", "Private", "Food lover", "Night tour", "K-pop fan", "History buff"];
  const toggleDest = d => setDest(p => p.includes(d) ? p.filter(x => x !== d) : [...p, d]);
  const toggleTag = t => setTags(p => p.includes(t) ? p.filter(x => x !== t) : [...p, t]);

  return (
    <div style={{ padding: "24px 20px", fontFamily: "'DM Sans', sans-serif", overflowY: "auto", height: "100%", paddingBottom: 80 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');`}</style>
      <p style={{ margin: "0 0 4px", fontSize: 11, color: "#0d5c63", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>AI Matching</p>
      <h2 style={{ margin: "0 0 6px", fontFamily: "'Fraunces', serif", fontSize: 24, color: "#1a1a2e", fontWeight: 700 }}>어떤 투어를 찾으세요?</h2>
      <p style={{ margin: "0 0 24px", fontSize: 13, color: "#666", lineHeight: 1.5 }}>목적지와 스타일을 선택하면<br/>AI가 최적 투어를 매칭해드려요.</p>

      <p style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 600, color: "#1a1a2e" }}>📍 목적지</p>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {["Jeju", "Seoul", "Busan"].map(d => (
          <button key={d} onClick={() => toggleDest(d)} style={{
            flex: 1, padding: "12px 0", borderRadius: 12,
            border: dest.includes(d) ? "2px solid #0d5c63" : "2px solid #e5e7eb",
            background: dest.includes(d) ? "#f0faf9" : "#fff",
            color: dest.includes(d) ? "#0d5c63" : "#666",
            fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer",
          }}>{d}</button>
        ))}
      </div>

      <p style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 600, color: "#1a1a2e" }}>🏷️ 여행 스타일</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 24 }}>
        {TAGS.map(t => (
          <button key={t} onClick={() => toggleTag(t)} style={{
            padding: "7px 14px", borderRadius: 20,
            border: tags.includes(t) ? "2px solid #0d5c63" : "2px solid #e5e7eb",
            background: tags.includes(t) ? "#0d5c63" : "#fff",
            color: tags.includes(t) ? "#fff" : "#555",
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, cursor: "pointer",
          }}>{t}</button>
        ))}
      </div>

      <button disabled={dest.length === 0} style={{
        width: "100%", padding: "15px",
        background: dest.length > 0 ? "linear-gradient(135deg, #0d5c63, #1a8a7a)" : "#e5e7eb",
        color: dest.length > 0 ? "#fff" : "#aaa",
        border: "none", borderRadius: 14,
        fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 700, cursor: dest.length > 0 ? "pointer" : "default",
      }}>
        {dest.length > 0 ? `✨ ${dest.join(" · ")} 매칭 시작 →` : "목적지를 선택해주세요"}
      </button>
    </div>
  );
}

    <div style={{ padding: "24px 0 80px", fontFamily: "'DM Sans', sans-serif", overflowY: "auto", height: "100%" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');`}</style>

      <div style={{
        margin: "0 20px 24px", borderRadius: 20, overflow: "hidden",
        background: "linear-gradient(160deg, #0d2b35, #0d5c63)",
        padding: "28px 24px", position: "relative",
      }}>
        <div style={{ position: "absolute", right: 0, bottom: 0, fontSize: 100, opacity: 0.12 }}>⛵</div>
        <p style={{ margin: "0 0 4px", fontSize: 11, color: "rgba(255,255,255,0.6)", textTransform: "uppercase", letterSpacing: 1 }}>On the Water</p>
        <h2 style={{ margin: "0 0 8px", fontFamily: "'Fraunces', serif", fontSize: 26, color: "#fff", fontWeight: 700, lineHeight: 1.2 }}>바다에서 만나는<br/>한국</h2>

      <div style={{ padding: "0 20px" }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>

              padding: "7px 16px", borderRadius: 20,

          ))}
        </div>

        {[
          { title: "Jeju Sunset Cruise", duration: "2시간", price: 59, rating: 4.9, reviews: 142, icon: "🌅", tag: "POPULAR" },
          { title: "Busan Yacht Night Tour", duration: "1.5시간", price: 79, rating: 4.8, reviews: 98, icon: "🌃", tag: "ROMANTIC" },
          { title: "Haenyeo Dive Show + Cruise", duration: "3시간", price: 89, rating: 5.0, reviews: 67, icon: "🤿", tag: "CULTURAL" },
          { title: "Jeju Dolphin Watch", duration: "2.5시간", price: 69, rating: 4.7, reviews: 211, icon: "🐬", tag: "NATURE" },
        ].map(c => (
          <div key={c.title} style={{
            background: "#fff", borderRadius: 16, marginBottom: 12, overflow: "hidden",
            boxShadow: "0 2px 12px rgba(0,0,0,0.07)", display: "flex",

            <div style={{
              width: 90, background: "linear-gradient(135deg, #0d2b35, #0d5c63)",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, flexShrink: 0,
            }}>{c.icon}</div>
            <div style={{ padding: "12px 14px", flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 14, fontWeight: 700, color: "#1a1a2e", lineHeight: 1.3 }}>{c.title}</p>
                <span style={{
                  background: "#0d5c63", color: "#fff", fontSize: 9,
                  padding: "2px 6px", borderRadius: 6, fontWeight: 700, letterSpacing: 0.5, flexShrink: 0, marginLeft: 8,
                }}>{c.tag}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                <span style={{ fontSize: 11, color: "#888" }}>⏱ {c.duration}</span>
                <span style={{ color: "#ddd" }}>·</span>
                <span style={{ fontSize: 11, color: "#f5a623" }}>★ {c.rating}</span>
                <span style={{ fontSize: 11, color: "#aaa" }}>({c.reviews})</span>
              </div>
              <p style={{ margin: "4px 0 0", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 14, color: "#0d5c63" }}>from ${c.price}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MyPageTab() {
  return (
    <div style={{ padding: "24px 20px 80px", fontFamily: "'DM Sans', sans-serif", overflowY: "auto", height: "100%" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');`}</style>

      <div style={{
        background: "linear-gradient(135deg, #0d2b35, #0d5c63)",
        borderRadius: 20, padding: "24px", marginBottom: 20, display: "flex", alignItems: "center", gap: 16,
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: "50%",
          background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24,
        }}>👤</div>
        <div>
          <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 18, color: "#fff", fontWeight: 700 }}>로그인 / 회원가입</p>
          <p style={{ margin: "2px 0 0", fontSize: 12, color: "rgba(255,255,255,0.7)" }}>예약 내역, 위시리스트, 리뷰 관리</p>
        </div>
      </div>

      {[
        { icon: "📋", label: "내 예약 내역", sub: "Booking history" },
        { icon: "❤️", label: "위시리스트", sub: "Saved tours" },
        { icon: "⭐", label: "내 리뷰", sub: "My reviews" },
        { icon: "💬", label: "문의 내역", sub: "Support tickets" },
        { icon: "🌐", label: "언어 / 통화", sub: "Language & currency" },
        { icon: "📞", label: "고객센터", sub: "Help & support" },
      ].map(item => (
        <div key={item.label} style={{
          display: "flex", alignItems: "center", gap: 14, padding: "14px 0",
          borderBottom: "1px solid #f0f0f0", cursor: "pointer",
        }}>
          <span style={{ fontSize: 22, width: 30, textAlign: "center" }}>{item.icon}</span>
          <div style={{ flex: 1 }}>
            <p style={{ margin: 0, fontSize: 14, fontWeight: 600, color: "#1a1a2e" }}>{item.label}</p>
            <p style={{ margin: 0, fontSize: 11, color: "#999" }}>{item.sub}</p>
          </div>
          <span style={{ color: "#ccc", fontSize: 16 }}>›</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("showcase");
  const [cartCount] = useState(2);

  const tabs = [
    { id: "showcase", label: "쇼케이스", icon: "🏠" },
    { id: "match", label: "매칭", icon: "✨" },
    { id: "cruise", label: "크루즈", icon: "🚢" },
    { id: "mypage", label: "마이페이지", icon: "👤" },
  ];

  return (
    <div style={{
      display: "flex", justifyContent: "center", alignItems: "center",
      minHeight: "100vh", background: "#e8edf2", padding: 20,
      fontFamily: "'DM Sans', sans-serif",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { display: none; }
        button { -webkit-tap-highlight-color: transparent; }
      `}</style>

      <div style={{
        width: 390, height: 844,
        background: "#f5f6f8",
        borderRadius: 52,
        boxShadow: "0 30px 80px rgba(0,0,0,0.35), 0 0 0 10px #1a1a1a, 0 0 0 11px #333",
        overflow: "hidden", position: "relative", display: "flex", flexDirection: "column",
      }}>
        {/* Status bar */}
        <div style={{ background: activeTab === "showcase" ? "#0d2b35" : "#fff", height: 48, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 28px", flexShrink: 0 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: activeTab === "showcase" ? "#fff" : "#1a1a2e" }}>9:41</span>
          <div style={{ width: 120, height: 28, background: "#1a1a1a", borderRadius: 20, position: "absolute", left: "50%", transform: "translateX(-50%)", top: 6 }} />
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <span style={{ fontSize: 11, color: activeTab === "showcase" ? "#fff" : "#1a1a2e" }}>●●●</span>
          </div>
        </div>

        {/* Header */}
        <div style={{
          background: activeTab === "showcase" ? "#0d2b35" : "#fff",
          padding: "0 20px 12px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          flexShrink: 0,
          borderBottom: activeTab !== "showcase" ? "1px solid #f0f0f0" : "none",
        }}>
          <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 20, fontWeight: 700, color: activeTab === "showcase" ? "#fff" : "#1a1a2e" }}>AtoC<span style={{ color: "#1a8a7a" }}>.</span></p>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: activeTab === "showcase" ? "rgba(255,255,255,0.7)" : "#666", fontFamily: "'DM Sans', sans-serif" }}>🇺🇸 EN</button>
            <button style={{ position: "relative", background: "none", border: "none", cursor: "pointer" }}>
              <span style={{ fontSize: 22 }}>🛒</span>
              {cartCount > 0 && <span style={{
                position: "absolute", top: -4, right: -4,
                background: "#e85d4a", color: "#fff",
                width: 18, height: 18, borderRadius: "50%", fontSize: 10,
                display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700,
              }}>{cartCount}</span>}
            </button>
          </div>
        </div>

        {/* Content */}
        <div style={{ flex: 1, overflow: "hidden", position: "relative" }}>
          {activeTab === "showcase" && <ShowcaseTab onNav={setActiveTab} />}
          {activeTab === "match" && <MatchTab />}
          {activeTab === "cruise" && <CruiseTab />}
          {activeTab === "mypage" && <MyPageTab />}
        </div>

        {/* Bottom Nav */}
        <div style={{
          background: "#fff",
          borderTop: "1px solid #f0f0f0",
          display: "flex",
          paddingBottom: 20,
          flexShrink: 0,
          boxShadow: "0 -4px 20px rgba(0,0,0,0.08)",
        }}>
          {tabs.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
              gap: 3, padding: "10px 0", background: "none", border: "none", cursor: "pointer",
              position: "relative",
            }}>
              {activeTab === tab.id && <div style={{
                position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
                width: 24, height: 3, background: "#0d5c63", borderRadius: 3,
              }} />}
              <span style={{ fontSize: 20, filter: activeTab === tab.id ? "none" : "grayscale(0.8)", opacity: activeTab === tab.id ? 1 : 0.5 }}>{tab.icon}</span>
              <span style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: activeTab === tab.id ? 700 : 500,
                color: activeTab === tab.id ? "#0d5c63" : "#999",
              }}>{tab.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
