<!-- Square brand mark (matches header Logo). Regenerate PNGs: npm run icons:sync -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="AtoC">
  <defs>
    <clipPath id="atoc-mark-clip">
      <rect x="1" y="1" width="38" height="38" rx="9.5" />
    </clipPath>
    <linearGradient id="atoc-mark-outer" x1="6" y1="3" x2="36" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#283548" />
      <stop offset="42%" stop-color="#161E2A" />
      <stop offset="100%" stop-color="#0f141c" />
    </linearGradient>
    <linearGradient id="atoc-mark-line" x1="10" y1="11" x2="30" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.98)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.76)" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="38" height="38" rx="9.5" fill="url(#atoc-mark-outer)" />
  <g clip-path="url(#atoc-mark-clip)">
    <rect
      x="9.5"
      y="9.5"
      width="21"
      height="21"
      rx="4.85"
      fill="none"
      stroke="url(#atoc-mark-line)"
      stroke-width="0.98"
    />
    <path
      d="M14.5 25.5 L20 16.2 L25.5 25.5"
      fill="none"
      stroke="url(#atoc-mark-line)"
      stroke-width="1.48"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
