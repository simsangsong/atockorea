<svg
  width="200"
  height="48"
  viewBox="0 0 200 48"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
    <radialGradient id="radialGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.25" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for AtoC Korea text (blue to orange) -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
  </defs>

  <!-- Icon group (shifted: viewBox 0 0 48 48 content drawn at 0,0) -->
  <g transform="translate(0, 0)">
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.3" />
    <circle cx="24" cy="24" r="20" fill="url(#logoGradient)" filter="url(#shadow)" />
    <circle cx="24" cy="24" r="20" fill="url(#radialGradient)" />
    <circle cx="24" cy="24" r="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" />
    <text x="24" y="30" font-size="14" font-weight="900" fill="white" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-0.8" filter="url(#glow)">A2C</text>
    <circle cx="24" cy="12" r="1.5" fill="rgba(255,255,255,0.6)" />
    <circle cx="24" cy="36" r="1.5" fill="rgba(255,255,255,0.6)" />
    <circle cx="12" cy="24" r="1.5" fill="rgba(255,255,255,0.6)" />
    <circle cx="36" cy="24" r="1.5" fill="rgba(255,255,255,0.6)" />
  </g>

  <!-- AtoC Korea text -->
  <text x="56" y="28" font-size="20" font-weight="800" fill="url(#textGradient)" font-family="system-ui, -apple-system, sans-serif">AtoC Korea</text>
  <!-- Agency to Customer subtitle -->
  <text x="56" y="42" font-size="10" font-weight="600" fill="#6B7280" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.05em">AGENCY TO CUSTOMER</text>
</svg>
