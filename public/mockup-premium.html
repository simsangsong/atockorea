        <p style={{ margin:'0 0 4px', fontFamily:F, fontSize:10, color:'rgba(255,255,255,.45)', letterSpacing:2, textTransform:'uppercase', fontWeight:600 }}>AI Matching</p>
        <h2 style={{ margin:'0 0 6px', fontFamily:F, fontSize:26, color:'#fff', fontWeight:900, letterSpacing:'-.5px', lineHeight:1.15 }}>Find your best-fit<br/>tour in 3 seconds.</h2>

            return (
              <button key={d} onClick={()=>toggle(dests,setDests,d)} style={{ flex:1, padding:'13px 0', borderRadius:14, border:`2px solid ${on?C.navy:C.border}`, background:on?C.navy:'#fff', color:on?'#fff':C.text, fontFamily:F, fontSize:13, fontWeight:700, cursor:'pointer' }}>
                <div>{d}</div>
                <div style={{ fontSize:10, fontWeight:400, color:on?'rgba(255,255,255,.5)':C.muted, marginTop:2 }}>● Open now</div>

        </div>

        <p style={{ margin:'0 0 10px', fontFamily:F, fontSize:13, fontWeight:700, color:C.navy }}>Quick add (optional)</p>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:26 }}>
          {STYLE_TAGS.map(t=>{
            const on=tags.includes(t);
            return <button key={t} onClick={()=>toggle(tags,setTags,t)} style={{ padding:'7px 15px', borderRadius:22, border:`1.5px solid ${on?C.navy:C.border}`, background:on?C.navy:'#fff', color:on?'#fff':C.text, fontFamily:F, fontSize:12, fontWeight:500, cursor:'pointer' }}>{t}</button>;

        </div>

        <p style={{ margin:'0 0 14px', fontFamily:F, fontSize:11, color:C.muted, textAlign:'center' }}>Compare small group, private, and bus options next.</p>
        <button disabled={!dests.length} style={{ width:'100%', padding:'16px', background:dests.length?C.navy:'#e5e7eb', color:dests.length?'#fff':'#aaa', border:'none', borderRadius:14, fontFamily:F, fontSize:15, fontWeight:800, cursor:dests.length?'pointer':'default', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
          Start matching {dests.length?<span style={{fontSize:16}}>↑</span>:null}
        </button>
      </div>
    </div>
  );
}
